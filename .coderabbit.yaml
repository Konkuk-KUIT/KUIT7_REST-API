# CodeRabbit 설정 — KUIT 7주차 미션 (JPA 배달앱 REST API)
# https://docs.coderabbit.ai/guides/configure-coderabbit

language: "ko-KR"

reviews:
  profile: "assertive"          # 학습 목적이므로 꼼꼼하게 피드백
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  # ── 리뷰 지시사항 (전체 파일 공통) ──
  instructions: |
    이 레포는 KUIT 7주차 미션 레포입니다.
    Spring Boot 3 + JPA + MySQL 환경에서 배달앱 REST API 10개를 직접 설계·구현하는 과제입니다.

    ## 반드시 리뷰할 항목
    - JPA 엔티티 설계: 연관관계 방향, 지연/즉시 로딩(@OneToMany 기본값 LAZY 확인), 불필요한 양방향 관계
    - N+1 문제: 루프 내 쿼리 반복, fetch join 또는 @EntityGraph 미사용 여부
    - DTO 검증: @Valid + @NotBlank / @NotNull / @Size 등 누락 여부
    - ApiResponse 일관성: 성공·실패 응답 모두 ApiResponse 래퍼 사용 여부
    - ErrorStatus 활용: 예외 발생 시 GeneralException + ErrorStatus 패턴을 사용하는지
    - HTTP 메서드 적절성: 조회=GET, 생성=POST, 삭제=DELETE, 수정=PATCH/PUT
    - URI 컨벤션: 소문자 케밥케이스, 명사 복수형, PathVariable 적절 사용
    - 트랜잭션: 서비스 계층의 @Transactional 누락 여부 (조회는 readOnly=true)
    - 페이징: Page / Slice + Pageable 사용 여부 (조회 API에 권장)
    - 코드 중복: 반복 로직은 private 메서드 또는 유틸로 분리 권장

    ## 리뷰하지 않을 항목 (의도적 미구현)
    - JWT 토큰 검증 및 인증/인가 로직 — 8주차 커리큘럼에서 다룰 예정
    - Spring Security 설정 누락 — 마찬가지로 8주차 이후
    - 비밀번호 암호화(BCrypt 등) 미적용 — 인증 구현 시 함께 추가 예정
    - memberId를 PathVariable·RequestBody로 직접 받는 방식 — 토큰 기반 인증 전 임시 방식
    - 테스트 코드 부재 — 이번 미션 범위 외

  # ── 파일별 세부 지시사항 ──
  path_instructions:
    - path: "src/main/java/**/domain/**"
      instructions: |
        JPA 엔티티 파일입니다.
        - @Column(nullable = false) 등 제약조건이 ERD와 일치하는지 확인
        - BaseEntity(createdAt, updatedAt) 상속 여부
        - @Enumerated(EnumType.STRING) 사용 권장 (ORDINAL 사용 시 지적)
        - 연관관계 편의 메서드 존재 여부 (양방향일 경우)
        - @ManyToOne 쪽에 @JoinColumn 명시 여부
        - Lombok @Setter 전체 사용 자제 권장 (생성자·빌더 패턴 선호)

    - path: "src/main/java/**/controller/**"
      instructions: |
        컨트롤러 파일입니다.
        - 비즈니스 로직이 컨트롤러에 있는지 확인 (있으면 서비스 이동 권장)
        - @RequestBody에 @Valid 누락 여부
        - 반환 타입이 ApiResponse<T>인지 확인
        - MemberController의 JWT 미구현 주석과 동일하게, 다른 컨트롤러에도
          인증 관련 주석이 있다면 리뷰 스킵

    - path: "src/main/java/**/service/**"
      instructions: |
        서비스 파일입니다.
        - 클래스 레벨 또는 메서드 레벨 @Transactional 확인
        - 조회 전용 메서드에 @Transactional(readOnly = true) 권장
        - 엔티티를 직접 반환하지 않고 DTO로 변환하는지 확인
        - 예외 처리 시 GeneralException(ErrorStatus.XXX) 패턴 사용 여부

    - path: "src/main/java/**/repository/**"
      instructions: |
        레포지토리 파일입니다.
        - JpaRepository 상속 여부
        - 복잡한 조회는 @Query 또는 QueryDSL 사용 권장
        - N+1 방지를 위한 fetch join / @EntityGraph 사용 여부

    - path: "src/main/java/**/dto/**"
      instructions: |
        DTO 파일입니다.
        - 요청 DTO(Req): @NotBlank, @NotNull, @Size, @Email 등 검증 어노테이션 확인
        - 응답 DTO(Res): 민감 정보(비밀번호 등) 포함 여부 확인
        - @Builder 또는 정적 팩토리 메서드 활용 권장

    - path: "src/main/java/**/exception/**"
      instructions: |
        예외 관련 파일입니다.
        - 새 예외 코드를 ErrorStatus enum에 추가했는지 확인
        - 새 예외 클래스가 GeneralException을 상속하는지 확인

  # ── 무시할 파일 ──
  path_filters:
    - "!build/**"
    - "!.gradle/**"
    - "!gradle/**"
    - "!**/*.class"
    - "!**/BaeminApplicationTests.java"   # 기본 생성 테스트
    - "!**/DataInitializer.java"          # 샘플 데이터 초기화는 리뷰 스킵

chat:
  auto_reply: true
