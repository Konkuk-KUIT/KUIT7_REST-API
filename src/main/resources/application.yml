spring:
  datasource:
    url: jdbc:mysql://localhost:3306/baemin #jdbc:mysql://localhost:3306/{본인이 저번주차에 생성했던 DB 이름}
    username:  # 본인 DB username 환경변수에 저장
    password: # 본인 DB 비밀번호 환경변수에 저장
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none   # 개발 중에는 create, 이후 validate로 변경
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  data:
    jpa:
      repositories:
        bootstrap-mode: default