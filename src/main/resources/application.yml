spring:
  datasource:
    url: jdbc:mysql://localhost:3306/baemin_db
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    hibernate:
      ddl-auto: create   # 개발 중에는 create, 이후 validate로 변경
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  data:
    jpa:
      repositories:
        bootstrap-mode: default